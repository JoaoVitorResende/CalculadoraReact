<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Alice&family=Archivo:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:wght@400;500;700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Syne:wght@400..800&display=swap"
    rel="stylesheet">
  <title>Calculator</title>

  <style type="text/tailwindcss">
    @theme{
      --text: #ebebeb;
      --text-secondary: #6b6b6b;
      --primary: #462878;
      --background: #2D2A37;

      --gradient: 180deg, rgba(0, 0, 0, 0.05) 100%;
      --gradient-hover: 180deg, rgba(0, 0, 0, 0.1) 100%;

      --shadow:
        0px 11px 7px 0px rgba(0, 0, 0, 0.01),
        0px 7px 7px 0px rgba(0, 0, 0, 0.04),
        0px 4px 6px 0px rgba(0, 0, 0, 0.10),
        0px 2px 4px 0px rgba(0, 0, 0, 0.26),
        0px 0px 2px 0px rgba(0, 0, 0, 0.29),
        0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;

      --font-sans: "Rubik", sans-serif;
    }
    body {
      background: var(--background);
      color: var(--text);
      font-family: var(--font-sans);
    }
  </style>
</head>

<body className="text-(--text) font-(--font-sans)">
  <div id="root"></div>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    function App() {
      const textVariants = {
        default: 'text-xl',
        muted: 'text-xl text-(--text-secondary)',
        heading: 'text-2xl',
        blast: 'text-3xl'
      }
      function Text({ as = 'span', variant = 'default', className, children, ...props }) {
        return React.createElement(
          as,
          {
            className: `${textVariants[variant]} ${className}`,
            ...props
          },
          children
        )
      }
      return (
        <main className="py-28 px-4">
          <Text>Hello world !</Text>
        </main>
      )
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
